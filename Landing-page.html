<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css"
      integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Icons CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <!-- nav starts  -->
    <section class="header">
      <nav class="navbar navbar-expand-lg navbar-light">
        <!-- logo  -->
        <div>
          <img
            class="logo-img p-0 mx-lg-5"
            src="./assest/logo.png"
            alt="img"
            width="auto"
          />
        </div>
        <!-- logo  -->
        <!-- toogler  -->
        <button
          class="navbar-toggler m"
          type="button"
          data-toggle="collapse"
          data-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span
            class="navbar-toggler-icon"
            style="background-color: #00a859"
          ></span>
        </button>
        <!-- toogler  -->
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <!-- nav list  -->
          <ul class="navbar-nav mb-lg-0 mx-lg-3">
            <li class="nav-item mx-3">
              <a
                class="nav-link active"
                aria-current="page"
                href="#"
                style="color: #0f0b0b; font-size: 15px; font-weight: bold"
                >Home</a
              >
            </li>
            <li class="nav-item mx-3">
              <a
                class="nav-link"
                href="#"
                style="color: #0f0b0b; font-size: 15px; font-weight: bold"
                >Our benefits</a
              >
            </li>
            <li class="nav-item mx-3">
              <a
                class="nav-link"
                href="#"
                style="color: #0f0b0b; font-size: 15px; font-weight: bold"
              >
                Health Benefits
              </a>
            </li>
            <li class="nav-item mx-4">
              <a
                class="nav-link disabled"
                aria-disabled="true"
                style="color: #0f0b0b; font-size: 15px; font-weight: bold"
                >Blog</a
              >
            </li>
            <li class="nav-item mx-3">
              <a
                class="nav-link disabled"
                aria-disabled="true"
                style="color: #0f0b0b; font-size: 15px; font-weight: bold"
                >FAQs</a
              >
            </li>
            <!-- search icon  -->
            <div>
              <button
                class="icon-btn mt-2 mx-lg-5 mx-3"
                style="background: none; outline: none; border: none"
                aria-label="Search"
              >
                <i class="bi bi-search"></i>
              </button>
            </div>
            <!-- search icon  -->
          </ul>
          <!-- nav list  -->

          <!-- cart and button  -->
          <section class="d-lg-flex mx-lg-5 mx-3" role="search">
            <!-- cart and heart icon  -->
            <div class="icon-group mt-2 mr-2">
              <button
                class="icon-btn"
                style="background: none; outline: none; border: none"
                aria-label="Wishlist"
              >
                <i class="bi bi-heart"></i>
              </button>
              <button
                class="icon-btn cart-icon"
                style="background: none; outline: none; border: none"
                aria-label="Cart"
              >
                <i class="bi bi-bag"></i>
              </button>
            </div>
            <!-- cart and heart icon  -->
            <!-- button  -->
            <button
              class="green-btn"
              style="
                padding: 7px 15px;
                color: white;
                background-color: #00a859;
                border: none;
                border-radius: 8px;
                outline: none;
                box-shadow: none;
              "
            >
              Contact Us
            </button>
            <!-- button  -->
          </section>
          <!-- cart and button  -->
        </div>
      </nav>
    </section>
    <!-- nav ends  -->

    <!-- section 2 starts  -->
    <section class="container-fluid mt-5">
      <div class="row">
        <div class="col-lg-6 col-sm-12 col-md-12 p-lg-5">
          <p
            style="
              color: #0f0b0b;
              font-size: 18px;
              font-family: Inter, sans-serif;
            "
          >
            Discover the Pure Taste of Nature
          </p>
          <h1
            style="
              font-weight: bolder;
              font-size: 50px;
              color: #00a859;
              font-family: Roboto, sans-serif;
            "
          >
            Organic
            <span style="color: #f58634">Snacks</span>
            <br />
            <span style="color: #00a859">Made</span>
            <span style="color: #f58634">with</span>
            <span style="color: #00a859">Love,</span> <br />
            <span style="color: #00a859"
              >Just <span style="color: #f58634">for</span> You!</span
            >
          </h1>
          <button
            style="
              color: #fff;
              outline: none;
              border: none;
              background-color: #f58634;
              padding: 8px 15px;
              border-radius: 7px;
            "
          >
            Shop Now <img src="" alt="" />
          </button>
        </div>
        <div class="col-lg-6"></div>
      </div>
    </section>
    <!-- section 2 ends  -->

    <script
      src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-fQybjgWLrvvRgtW6bFlB7jaZrFsaBXjsOMm/tB9LTS58ONXgqbR9W8oWht/amnpF"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
